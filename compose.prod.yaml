services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SERVER_NAME: ${SERVER_NAME}
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM}
      NGINX_ENVSUBST_FILTER: SERVER_NAME|BACKEND_UPSTREAM
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    command: ["nginx", "-g", "daemon off;"]

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do
      certbot renew --webroot -w /var/www/certbot --quiet;
      sleep 12h & wait $${!};
      done"

volumes:
  certbot-conf:
  certbot-www:
