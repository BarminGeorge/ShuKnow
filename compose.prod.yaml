services:
  backend:
    container_name: shuknow-api
    image: ${BACKEND_IMAGE:-ghcr.io/barmingeorge/shuknow:latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres};Database=${POSTGRES_DB:-shuknow}
      ConnectionStrings__Redis: redis:6379
      BlobStorage__Provider: ${BLOB_PROVIDER:-S3}
      BlobStorage__S3__ServiceUrl: http://rustfs:9000
      BlobStorage__S3__AccessKey: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      BlobStorage__S3__SecretKey: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      BlobStorage__S3__BucketName: ${RUSTFS_BUCKET_NAME:-shuknow}
      BlobStorage__S3__Prefix: ${RUSTFS_PREFIX:-blobs}
      BlobStorage__S3__ForcePathStyle: "true"
      Jwt__Key: ${JWT_KEY:?JWT_KEY must be set}
      Jwt__Issuer: ${JWT_ISSUER:-shuknow}
      Jwt__Audience: ${JWT_AUDIENCE:-shuknow}
      Jwt__ExpiresInMinutes: ${JWT_EXPIRES_IN_MINUTES:-60}
      Encryption__Key: ${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set}
      AuthCookie__Secure: "true"
    volumes:
      - backend-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_started
    networks:
      - shuknow-prod

  postgres:
    image: postgres:16-alpine
    container_name: shuknow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shuknow}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-shuknow}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - shuknow-prod

  redis:
    image: redis:8.6.2-alpine
    container_name: shuknow-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - shuknow-prod

  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.80
    container_name: shuknow-rustfs
    restart: unless-stopped
    command: /data
    environment:
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_CONSOLE_ENABLE: "true"
    volumes:
      - rustfs-data:/data
    networks:
      - shuknow-prod

  prometheus:
    image: prom/prometheus:v3.11.0
    container_name: shuknow-prometheus
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    depends_on:
      backend:
        condition: service_started
    networks:
      - shuknow-prod

  grafana:
    image: grafana/grafana:12.5.0
    container_name: shuknow-grafana
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - shuknow-prod

  nginx:
    image: nginx:1.27-alpine
    container_name: shuknow-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SERVER_NAME: ${SERVER_NAME}
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-backend:8080}
      NGINX_ENVSUBST_FILTER: SERVER_NAME|BACKEND_UPSTREAM
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    command: ["nginx", "-g", "daemon off;"]
    depends_on:
      backend:
        condition: service_started
    networks:
      - shuknow-prod

  certbot:
    image: certbot/certbot:latest
    container_name: shuknow-certbot
    restart: unless-stopped
    environment:
      SERVER_NAME: ${SERVER_NAME}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do
      certbot renew --webroot -w /var/www/certbot --quiet;
      sleep 12h & wait $${!};
      done"
    depends_on:
      nginx:
        condition: service_started
    networks:
      - shuknow-prod

volumes:
  backend-data:
  postgres-data:
  redis-data:
  rustfs-data:
  prometheus-data:
  grafana-data:
  certbot-conf:
  certbot-www:

networks:
  shuknow-prod:
    driver: bridge
