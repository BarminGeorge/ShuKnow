services:
  backend:
    image: shuknow-backend-local
    pull_policy: never
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      BlobStorage__Provider: S3
      BlobStorage__S3__ServiceUrl: http://rustfs:9000
      BlobStorage__S3__AccessKey: rustfsadmin
      BlobStorage__S3__SecretKey: rustfsadmin
      BlobStorage__S3__BucketName: shuknow
      BlobStorage__S3__Prefix: blobs
      BlobStorage__S3__ForcePathStyle: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_started

  frontend:
    image: shuknow-frontend-local
    pull_policy: never
    build:
      context: ./frontend
      dockerfile: Dockerfile

  nginx:
    ports:
      - "80:80"
    environment:
      SERVER_NAME: localhost
      BACKEND_UPSTREAM: backend:8080
      FRONTEND_UPSTREAM: frontend:80
      NGINX_ENVSUBST_FILTER: SERVER_NAME|BACKEND_UPSTREAM|FRONTEND_UPSTREAM
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d/default.localhost.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started

  certbot-init:
    network_mode: "none"
    entrypoint: ["/bin/sh", "-c", "exit 0"]
    volumes: []

  certbot:
    profiles: ["ssl"]

  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.80
    command: /data
    environment:
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_CONSOLE_ENABLE: "true"
    volumes:
      - rustfs-local-data:/data

  prometheus:
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"

  grafana:
    environment:
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    ports:
      - "3000:3000"

volumes:
  rustfs-local-data:
