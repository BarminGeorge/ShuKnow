services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shuknow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  rustfs:
    image: rustfs/rustfs:latest
    command: /data
    environment:
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_CONSOLE_ENABLE: "true"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs-data:/data

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      SERVER_NAME: ${SERVER_NAME:-localhost}
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-host.docker.internal:5209}
      NGINX_ENVSUBST_FILTER: SERVER_NAME|BACKEND_UPSTREAM
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d/default.dev.conf.template:/etc/nginx/templates/default.conf.template:ro
    command: ["nginx", "-g", "daemon off;"]

volumes:
  postgres-data:
  rustfs-data:
