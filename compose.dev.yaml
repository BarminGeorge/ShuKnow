services:
  backend:
    container_name: shuknow-api-dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Username=postgres;Password=postgres;Database=shuknow_dev
      ConnectionStrings__Redis: redis:6379
      BlobStorage__S3__ServiceUrl: http://rustfs:9000
    ports:
      - "5209:8080"
    depends_on:
      - postgres
      - redis
      - rustfs
    networks:
      - shuknow-dev

  postgres:
    image: postgres:16-alpine
    container_name: shuknow-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: shuknow_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - shuknow-dev

  redis:
    image: redis:7-alpine
    container_name: shuknow-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - shuknow-dev

  rustfs:
    image: rustfs/rustfs:latest
    command: /data
    environment:
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_CONSOLE_ENABLE: "true"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs-data:/data
    networks:
      - shuknow-dev

  prometheus:
    image: prom/prometheus:latest
    container_name: shuknow-prometheus-dev
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - shuknow-dev
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: shuknow-grafana-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - shuknow-dev
    depends_on:
      - prometheus

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      SERVER_NAME: ${SERVER_NAME:-localhost}
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-host.docker.internal:5209}
      NGINX_ENVSUBST_FILTER: SERVER_NAME|BACKEND_UPSTREAM
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d/default.dev.conf.template:/etc/nginx/templates/default.conf.template:ro
    command: ["nginx", "-g", "daemon off;"]

volumes:
  postgres-data:
  rustfs-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  shuknow-dev:
    driver: bridge
