name: Tests On Push

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore backend/ShuKnow.sln

      - name: Build
        run: dotnet build backend/ShuKnow.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test backend/ShuKnow.sln --configuration Release --no-build --verbosity normal
