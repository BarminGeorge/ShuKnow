<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#131620"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" rx="16" fill="url(#bg)"/>
  <rect width="600" height="400" rx="16" fill="url(#glow)"/>

  <!-- Incoming file label -->
  <rect x="30" y="25" width="180" height="30" rx="8" fill="#1e2030"/>
  <text x="50" y="44" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">📎 notes_react.md</text>

  <!-- Arrow down -->
  <line x1="120" y1="65" x2="120" y2="95" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4"/>
  <polygon points="114,90 120,100 126,90" fill="#3b82f6"/>

  <!-- AI brain box -->
  <rect x="70" y="105" width="100" height="36" rx="10" fill="#172033" stroke="#3b82f680" stroke-width="1"/>
  <text x="120" y="127" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">✦ Агент</text>

  <!-- Arrows to folders -->
  <line x1="170" y1="123" x2="300" y2="70" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="170" y1="123" x2="300" y2="170" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="170" y1="123" x2="300" y2="270" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Folder 1 -->
  <rect x="300" y="40" width="270" height="65" rx="12" fill="#0f1a12" stroke="#22c55e40" stroke-width="1"/>
  <text x="322" y="62" fill="#22c55e" font-family="system-ui, sans-serif" font-size="13">📁 Разработка / React</text>
  <text x="322" y="80" fill="#6b7c6b" font-family="system-ui, sans-serif" font-size="11">hooks_guide.md</text>
  <text x="322" y="95" fill="#22c55e" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">+ notes_react.md ✓</text>

  <!-- Folder 2 -->
  <rect x="300" y="140" width="270" height="65" rx="12" fill="#1a1508" stroke="#f59e0b40" stroke-width="1"/>
  <text x="322" y="162" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="13">📁 Учёба / Матан</text>
  <text x="322" y="180" fill="#7c7060" font-family="system-ui, sans-serif" font-size="11">limits_theory.pdf</text>
  <text x="322" y="195" fill="#7c7060" font-family="system-ui, sans-serif" font-size="11">integrals_notes.md</text>

  <!-- Folder 3 -->
  <rect x="300" y="240" width="270" height="65" rx="12" fill="#130f1e" stroke="#8b5cf640" stroke-width="1"/>
  <text x="322" y="262" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="13">📁 Идеи / Проекты</text>
  <text x="322" y="280" fill="#6b6080" font-family="system-ui, sans-serif" font-size="11">startup_plan.md</text>
  <text x="322" y="295" fill="#6b6080" font-family="system-ui, sans-serif" font-size="11">app_concept.md</text>

  <!-- Status bar -->
  <rect x="30" y="350" width="540" height="30" rx="8" fill="#1e2030"/>
  <circle cx="50" cy="365" r="5" fill="#22c55e"/>
  <text x="62" y="370" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">Файл распознан и сохранён за 1.2 сек</text>
</svg>