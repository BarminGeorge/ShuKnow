<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080808"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" rx="16" fill="url(#bg)"/>

  <!-- Header -->
  <text x="40" y="40" fill="#f3f4f6" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">Настройки модели</text>
  <text x="40" y="62" fill="#6b7280" font-family="system-ui, sans-serif" font-size="12">Выберите провайдера и модель для ИИ-агента</text>

  <!-- Provider selector -->
  <text x="40" y="100" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="11">Провайдер</text>

  <!-- Provider cards -->
  <rect x="40" y="112" width="160" height="50" rx="10" fill="#111111" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="65" y="135" fill="#f3f4f6" font-family="system-ui, sans-serif" font-size="13" font-weight="bold">◆ OpenAI</text>
  <text x="65" y="152" fill="#6b7280" font-family="system-ui, sans-serif" font-size="10">GPT-4o, GPT-4o-mini</text>
  <circle cx="184" cy="130" r="6" fill="#a78bfa"/>
  <text x="184" y="134" fill="white" font-family="system-ui, sans-serif" font-size="8" text-anchor="middle">✓</text>

  <rect x="215" y="112" width="160" height="50" rx="10" fill="#101010" stroke="#2a2434" stroke-width="1"/>
  <text x="240" y="135" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="13">▲ Anthropic</text>
  <text x="240" y="152" fill="#6b7280" font-family="system-ui, sans-serif" font-size="10">Claude 3.5, Claude 3</text>

  <rect x="390" y="112" width="160" height="50" rx="10" fill="#101010" stroke="#2a2434" stroke-width="1"/>
  <text x="415" y="135" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="13">⬡ Свой URL</text>
  <text x="415" y="152" fill="#6b7280" font-family="system-ui, sans-serif" font-size="10">OpenRouter, Ollama...</text>

  <!-- Model dropdown -->
  <text x="40" y="200" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="11">Модель</text>
  <rect x="40" y="210" width="260" height="38" rx="8" fill="#101010" stroke="#2a2434" stroke-width="1"/>
  <text x="56" y="233" fill="#f3f4f6" font-family="system-ui, sans-serif" font-size="13">gpt-4o-mini</text>
  <text x="275" y="233" fill="#6b7280" font-family="system-ui, sans-serif" font-size="12">▾</text>

  <!-- API key field -->
  <text x="40" y="280" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="11">API-ключ</text>
  <rect x="40" y="290" width="510" height="38" rx="8" fill="#101010" stroke="#2a2434" stroke-width="1"/>
  <text x="56" y="313" fill="#6b7280" font-family="system-ui, sans-serif" font-size="13">sk-••••••••••••••••••••••••••••••</text>

  <!-- Cost hint -->
  <rect x="40" y="345" width="510" height="35" rx="8" fill="#0f1a12" stroke="#22c55e30" stroke-width="1"/>
  <text x="60" y="367" fill="#22c55e" font-family="system-ui, sans-serif" font-size="11">💡 С gpt-4o-mini сортировка одного файла стоит ~$0.001</text>
</svg>