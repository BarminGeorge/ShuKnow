<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080808"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" rx="16" fill="url(#bg)"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="180" height="400" rx="16" fill="#0d0f18"/>
  <rect x="180" y="0" width="1" height="400" fill="#171719"/>

  <!-- Sidebar header -->
  <text x="20" y="35" fill="#f3f4f6" font-family="system-ui, sans-serif" font-size="14" font-weight="bold">Мои папки</text>

  <!-- Folder items in sidebar -->
  <rect x="10" y="50" width="160" height="36" rx="8" fill="#101010"/>
  <text x="30" y="72" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="12">📁 Учёба</text>

  <rect x="10" y="92" width="160" height="36" rx="8" fill="transparent"/>
  <text x="30" y="114" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="12">📁 Разработка</text>

  <rect x="10" y="134" width="160" height="36" rx="8" fill="transparent"/>
  <text x="30" y="156" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="12">📁 Идеи</text>

  <rect x="10" y="176" width="160" height="36" rx="8" fill="transparent"/>
  <text x="30" y="198" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="12">📁 Рецепты</text>

  <!-- Main content: folder settings -->
  <text x="210" y="35" fill="#f3f4f6" font-family="system-ui, sans-serif" font-size="15" font-weight="bold">Настройки папки — Учёба</text>

  <!-- Name field -->
  <text x="210" y="70" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="11">Название</text>
  <rect x="210" y="78" width="360" height="36" rx="8" fill="#101010" stroke="#2a2434" stroke-width="1"/>
  <text x="224" y="100" fill="#f3f4f6" font-family="system-ui, sans-serif" font-size="13">Учёба</text>

  <!-- Prompt field -->
  <text x="210" y="140" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="11">Промпт для агента</text>
  <rect x="210" y="148" width="360" height="90" rx="8" fill="#101010" stroke="#2a2434" stroke-width="1"/>
  <text x="224" y="170" fill="#d1d5db" font-family="system-ui, sans-serif" font-size="12">Сюда складывай всё, что связано</text>
  <text x="224" y="187" fill="#d1d5db" font-family="system-ui, sans-serif" font-size="12">с учебными материалами: лекции,</text>
  <text x="224" y="204" fill="#d1d5db" font-family="system-ui, sans-serif" font-size="12">конспекты, задачи, учебники.</text>
  <text x="224" y="221" fill="#d1d5db" font-family="system-ui, sans-serif" font-size="12">Разделяй по предметам.</text>

  <!-- Subfolders -->
  <text x="210" y="270" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="11">Подпапки</text>
  <rect x="210" y="280" width="110" height="30" rx="6" fill="#111111" stroke="#a78bfa40" stroke-width="1"/>
  <text x="228" y="299" fill="#c4b5fd" font-family="system-ui, sans-serif" font-size="11">📂 Матан</text>

  <rect x="330" y="280" width="140" height="30" rx="6" fill="#111111" stroke="#a78bfa40" stroke-width="1"/>
  <text x="348" y="299" fill="#c4b5fd" font-family="system-ui, sans-serif" font-size="11">📂 Лин. алгебра</text>

  <rect x="480" y="280" width="90" height="30" rx="6" fill="#111111" stroke="#a78bfa40" stroke-width="1"/>
  <text x="498" y="299" fill="#c4b5fd" font-family="system-ui, sans-serif" font-size="11">📂 ОС</text>

  <!-- Save button -->
  <rect x="210" y="340" width="140" height="38" rx="10" fill="#a78bfa"/>
  <text x="280" y="363" fill="white" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle" font-weight="bold">Сохранить</text>
</svg>