<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080808"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" rx="16" fill="url(#bg)"/>
  <rect x="0" y="0" width="600" height="400" rx="16" fill="url(#glow)"/>
  <!-- Chat area -->
  <!-- User message 1 -->
  <rect x="200" y="30" width="370" height="52" rx="12" fill="#171719"/>
  <text x="220" y="53" fill="#f3f4f6" font-family="system-ui, sans-serif" font-size="13">Вот конспект по линейной алгебре 📄</text>
  <text x="220" y="70" fill="#6b7280" font-family="system-ui, sans-serif" font-size="11">lecture_linalg.pdf</text>
  <!-- Bot response 1 -->
  <rect x="30" y="100" width="400" height="60" rx="12" fill="#111111"/>
  <circle cx="52" cy="120" r="12" fill="#a78bfa" opacity="0.2"/>
  <text x="48" y="124" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">✦</text>
  <text x="74" y="123" fill="#d1d5db" font-family="system-ui, sans-serif" font-size="12">Файл сохранён в 📁 Учёба / Линейная алгебра</text>
  <text x="74" y="143" fill="#6b7280" font-family="system-ui, sans-serif" font-size="11">Определил тему: матрицы и определители</text>
  <!-- User message 2 -->
  <rect x="250" y="180" width="320" height="44" rx="12" fill="#171719"/>
  <text x="270" y="206" fill="#f3f4f6" font-family="system-ui, sans-serif" font-size="13">Сохрани эту статью про React hooks</text>
  <!-- Bot response 2 -->
  <rect x="30" y="242" width="380" height="60" rx="12" fill="#111111"/>
  <circle cx="52" cy="262" r="12" fill="#a78bfa" opacity="0.2"/>
  <text x="48" y="266" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">✦</text>
  <text x="74" y="265" fill="#d1d5db" font-family="system-ui, sans-serif" font-size="12">Сохранено в 📁 Разработка / React</text>
  <text x="74" y="285" fill="#6b7280" font-family="system-ui, sans-serif" font-size="11">Тип: статья, тема: хуки useState, useEffect</text>
  <!-- Input bar -->
  <rect x="30" y="340" width="540" height="40" rx="20" fill="#101010" stroke="#2a2434" stroke-width="1"/>
  <text x="55" y="364" fill="#6b7280" font-family="system-ui, sans-serif" font-size="13">Отправьте текст, файл или ссылку...</text>
  <circle cx="545" cy="360" r="14" fill="#a78bfa" opacity="0.8"/>
  <text x="545" y="365" fill="white" font-family="system-ui, sans-serif" font-size="14" text-anchor="middle">↑</text>
</svg>